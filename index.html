<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Chat Messenger Demo</title>
  </head>
  <body>
    <h1>Website của tôi</h1>
    <p>Chat Messenger nằm góc dưới bên phải 👇</p>

    <!-- Messenger Plugin -->
    <div id="fb-root"></div>

    <script>
      window.fbAsyncInit = function () {
        FB.init({
          xfbml: true,
          version: "v18.0",
        });
      };

      (function (d, s, id) {
        var js,
          fjs = d.getElementsByTagName(s)[0];
        if (d.getElementById(id)) return;
        js = d.createElement(s);
        js.id = id;
        js.src = "https://connect.facebook.net/en_US/sdk/xfbml.customerchat.js"; // ⚠️ dùng en_US cho ổn định
        fjs.parentNode.insertBefore(js, fjs);
      })(document, "script", "facebook-jssdk");
    </script>

    <div
      class="fb-customerchat"
      attribution="biz_inbox"
      page_id="100070051623834"
      logged_in_greeting="Xin chào! Mình có thể giúp gì cho bạn?"
      logged_out_greeting="Xin chào! Mình có thể giúp gì cho bạn?"
    ></div>
  </body>
</html>
